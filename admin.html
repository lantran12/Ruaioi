<div class="admin-form">
    <input type="text" id="adminTitle" placeholder="Tên tác phẩm">
    <input type="text" id="adminAuthor" placeholder="Tác giả">
    <input type="text" id="adminImg" placeholder="Link ảnh bìa">
    <input type="text" id="adminTags" placeholder="Thể loại (cách nhau bằng dấu phẩy)">
    <select id="adminStatus">
        <option value="new">Mới cập nhật</option>
        <option value="completed">Đã trọn bộ</option>
    </select>
    <button onclick="publishStory()">Phát Hành Truyện ✨</button>
</div>
