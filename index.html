<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Động Chăn Rùa - Thế Giới Truyện Novel</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <a href="index.html" class="logo">🐢 Động Chăn Rùa</a>
            </div>
            <div class="user-actions">
                <button class="noti-btn" id="notiBtn">
                    <i class="fa-regular fa-bell"></i>
                    <span class="badge" id="notiCount">0</span>
                </button>
                <button class="auth-btn" id="authBtn">Đăng nhập / Đăng ký</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="random-featured" id="randomFeaturedSection">
            <h2 class="section-title">✨ Hôm Nay Đọc Gì?</h2>
            <div class="featured-card" id="featuredCard">
                <div class="loading">Đang tìm truyện hay cho bạn...</div>
            </div>
        </section>

        <section class="search-filter-section">
            <div class="filter-tabs">
                <button class="filter-tab active" data-target="genre-box">Thể loại</button>
                <button class="filter-tab" data-target="author-box">Tác giả</button>
                <button class="filter-tab" data-target="latest-box">Mới cập nhật</button>
                <button class="filter-tab" data-target="completed-box">Đã hoàn thành</button>
            </div>

            <div class="filter-results-container">
                <div class="filter-content active" id="genre-box">
                    <div class="tags-grid" id="genreTags">
                        <span class="tag-item">Ngôn Tình</span>
                        <span class="tag-item">Đam Mỹ</span>
                        <span class="tag-item">Cổ Đại</span>
                        <span class="tag-item">Hiện Đại</span>
                    </div>
                </div>
                <div class="filter-content" id="author-box">
                    <div class="tags-grid" id="authorTags">
                        </div>
                </div>
                <div class="filter-content" id="latest-box">
                    <p class="filter-hint">Hệ thống đang hiển thị truyện mới cập nhật bên dưới...</p>
                </div>
                <div class="filter-content" id="completed-box">
                    <p class="filter-hint">Bấm để xem danh sách truyện đã hoàn thành hoàn toàn.</p>
                </div>
            </div>

            <div class="ajax-story-list hidden" id="ajaxStoryList">
                <div class="grid-stories" id="ajaxStoriesGrid"></div>
            </div>
        </section>

        <section class="main-story-list">
            <h2 class="section-title">📚 Truyện Mới Cập Nhật</h2>
            <div class="grid-stories" id="mainStoriesGrid">
                </div>
        </section>

        <section class="top-views-section">
            <h2 class="section-title">🏆 Top 5 Động Chăn Rùa</h2>
            <div class="top-ranking-list" id="topViewsList">
                </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>Website for <strong>Động Chăn Rùa</strong> © 2026</p>
    </footer>

    <script type="module" src="assets/js/firebase.js"></script>
    <script type="module" src="assets/js/index.js"></script>
</body>
</html>
