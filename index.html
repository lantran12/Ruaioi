<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Động Chăn Rùa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Quicksand&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="netflix-header">
    <div class="header-left-zone">
        <div class="logo">
            <a href="index.html">Rùa<span>Novel</span></a>
        </div>
    </div>

    <div class="header-right-zone" style="display:flex;align-items:center;gap:10px;">
        
        <!-- USER -->
        <button id="btnHeaderAuth" class="btn-avatar-profile">
            <i class="fa-regular fa-user"></i>
        </button>

        <!-- NOTI -->
        <button id="notiBtn" class="noti-btn" style="display:none;">
            <i class="fa-regular fa-bell"></i>
            <span class="badge" id="notiCount">0</span>
        </button>

    </div>
</header>

<!-- ================= PROFILE ================= -->
<section id="profileSection" style="display:none;margin-top:90px;">
    <h2>PROFILE</h2>
    <button onclick="showHome()">← Về trang chủ</button>

    <img id="userCurrentAvatar" width="100">
    <h3 id="userProfileName"></h3>
    <p id="userProfileEmail"></p>

    <input id="editDisplayNameInput" placeholder="Tên mới">

    <div id="avatarGridContainer"></div>

    <button onclick="updateUserProfileData()">Cập nhật</button>
    <button onclick="logoutFromProfile()">Đăng xuất</button>

    <div id="userBookshelfContainer"></div>
</section>

<!-- ================= HOME ================= -->
<div id="homeMainContent">

<section id="featuredBook">
    <h1 id="heroTitle">Đang tải...</h1>
    <p id="heroSynopsis"></p>
    <a id="heroLink">Đọc ngay</a>
</section>

<div>
    <input id="searchInput">
    <button onclick="triggerSearch()">Search</button>
</div>

<div id="searchResultsSection" style="display:none;">
    <button onclick="closeSearch()">Đóng</button>
    <div id="resultsGrid"></div>
</div>

<h2>Top truyện</h2>
<div id="nominationListContainer"></div>

<h2>Mới cập nhật</h2>
<div id="bookGrid"></div>

</div>

<!-- ================= AUTH MODAL ================= -->
<div id="authModal" style="display:none;" onclick="closeAuthModalOverlay(event)">
    <div>
        <h3 id="authTitle">Đăng ký</h3>

        <input id="authDisplayName" placeholder="Tên">
        <input id="authEmail" placeholder="Email">
        <input id="authPassword" type="password">

        <button onclick="submitAuthForm()">Submit</button>
        <button onclick="toggleAuthMode()">Đổi mode</button>
    </div>
</div>

<!-- ================= SCRIPTS ================= -->
<script type="module" src="assets/js/firebase.js"></script>
<script type="module" src="assets/js/index.js"></script>
<script type="module" src="assets/js/notification.js"></script>

<!-- ⚠️ FIX QUAN TRỌNG -->
<script>
function closeAuthModalOverlay(e){
    if(e.target.id === "authModal"){
        document.getElementById("authModal").style.display = "none";
    }
}
</script>

</body>
</html>
