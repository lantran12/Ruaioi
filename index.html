<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Động Chăn Rùa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Gộp chung CSS Auth và Admin để file gọn hơn */
        .auth-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; place-items: center; }
        .auth-modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; position: relative; }
        .auth-group { margin-bottom: 15px; }
        .auth-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-auth-submit { width: 100%; padding: 12px; background: #ffb7b2; border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; }
        .avatar-selection-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; max-height: 150px; overflow-y: auto; }
        .avatar-option-img { width: 100%; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .avatar-option-img.selected { border-color: #ff9aa2; background: #ffe5e5; }
        #adminPanel { padding: 20px; border: 2px dashed #ff9aa2; border-radius: 15px; margin: 20px; background: #fff5f5; }
    </style>
</head>
<body>

    <header class="main-header custom-header">
        <div class="logo"><a href="index.html"><i class="fa-solid fa-book-open-reader"></i> Choco<span>Novel</span></a></div>
        <div class="header-right">
            <button class="btn btn-login" id="btnHeaderAuth" onclick="openAuthModal()"><i class="fa-solid fa-user"></i> Đăng ký / Đăng nhập</button>
            <button class="btn" id="btnOpenAdminPanel" style="display: none; background: #ff9aa2; margin-left: 10px;">👑 Admin</button>
        </div>
    </header>

    <!-- Profile & Home Content -->
    <section class="container" id="profileSection" style="display: none;"></section>
    
    <div id="homeMainContent">
        <section class="container"><div id="featuredBook"></div></section>
        <section class="container">
            <input type="text" id="searchInput" placeholder="Tìm tên truyện...">
            <button onclick="triggerSearch()">Tìm</button>
        </section>
        <main class="container">
            <div class="book-grid" id="bookGrid"></div>
        </main>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" style="display: none;">
        <h3>Đăng truyện mới</h3>
        <input type="text" id="adminId" placeholder="ID (vd: ten-truyen)">
        <input type="text" id="adminTitle" placeholder="Tên truyện">
        <input type="text" id="adminAuthor" placeholder="Tác giả">
        <input type="text" id="adminImg" placeholder="Link ảnh bìa">
        <textarea id="adminTags" placeholder="Thể loại (cách nhau dấu phẩy)"></textarea>
        <button onclick="submitNewStory()">Đăng truyện ngay!</button>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal" onclick="closeAuthModalOverlay(event)">
        <div class="auth-modal-content">
            <h3 id="authTitle">ĐĂNG KÝ THÀNH VIÊN</h3>
            <div id="nickNameGroup" class="auth-group"><input type="text" id="authDisplayName" placeholder="Biệt danh..."></div>
            <div class="auth-group"><input type="email" id="authEmail" placeholder="Email..."></div>
            <div class="auth-group"><input type="password" id="authPassword" placeholder="Mật khẩu..."></div>
            <button class="btn-auth-submit" id="btnAuthSubmit" onclick="submitAuthForm()">ĐĂNG KÝ</button>
        </div>
    </div>

    <script type="module" src="assets/js/index.js"></script>
</body>
</html>
