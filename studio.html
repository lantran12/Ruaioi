<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Studio RùaNovel</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
</head>
<body style="background-color: #fcf9fa;">

    <header class="netflix-header">
        <div class="logo"><a href="index.html">Rùa<span>Novel</span></a></div>
    </header>

    <main class="studio-grid" style="margin-top: 100px;">
        
        <aside class="story-list-sidebar">
            <h3 style="font-family: var(--font-serif); margin-bottom: 20px;">Chọn truyện để chỉnh sửa</h3>
            
            <div class="studio-story-card" style="border: 2px dashed #ff4d6d; text-align: center; margin-bottom: 20px;">
                <strong>+ Tạo truyện mới</strong>
            </div>

            <div id="storyListContainer">
                <div class="studio-story-card">
                    <h4>Bạo Long</h4>
                    <p>Đam Mỹ • Hoàn thành</p>
                </div>
            </div>
        </aside>

        <section class="work-area">
            <h2 id="currentStoryTitle" style="font-family: var(--font-serif); margin-bottom: 20px;">Bạo Long</h2>
            
            <input type="text" id="chapterTitle" placeholder="Tên chương mới..." style="padding: 15px; border-radius: var(--radius-card);">
            
            <div id="editor" style="margin-top: 20px; border: 1px solid #ddd; border-radius: var(--radius-card);">
                <p>Nội dung chương...</p>
            </div>

            <button class="btn-main" onclick="saveChapter()" style="margin-top: 20px; width: 100%;">Lưu chương lên Động</button>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="assets/js/studio.js" type="module"></script>
</body>
</html>
